name: ScholarFlow CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run Python unit tests
        run: python -m unittest tests.test_tutorial_sample tests.test_challenge_flow tests.test_notes_sources -v

      - name: Set up Node for JS syntax checks
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check frontend JavaScript syntax
        run: |
          node --check web/app.js
          node --check web/reader-controller.js
