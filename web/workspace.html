<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScholarFlow - 笔记写作</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body data-page="workspace">
    <div class="app-shell">
      <header class="site-topbar">
        <div class="brand-block">
          <div class="brand-mark">SF</div>
          <div>
            <p class="eyebrow">Academic Reading Workspace</p>
            <h1>ScholarFlow</h1>
          </div>
        </div>
        <nav class="main-nav">
          <a class="nav-link" href="/">首页</a>
          <a class="nav-link" href="/discovery">研究方向检索</a>
          <a class="nav-link" href="/reader" target="_blank" rel="noreferrer">论文阅读台</a>
          <a class="nav-link is-active" href="/workspace">笔记写作</a>
        </nav>
      </header>

      <div id="statusPanel" class="status-strip"></div>

      <main class="page-shell">
        <div class="page-head">
          <div>
            <p class="eyebrow">Workspace</p>
            <h2>把阅读结果沉淀成笔记、研究计划与写作草稿</h2>
          </div>
          <div class="button-row">
            <a class="button button--ghost" href="/reader" target="_blank" rel="noreferrer">重新打开阅读台</a>
          </div>
        </div>

        <section class="workspace-grid">
          <section class="panel workspace-current">
            <div class="section-head">
              <div>
                <p class="eyebrow">Current Paper</p>
                <h3>当前论文</h3>
              </div>
            </div>
            <div id="workspaceCurrentPaper" class="empty-state">先去阅读台选择一篇论文，这里才会展开对应的笔记和写作任务。</div>
          </section>

          <section class="panel">
            <div class="section-head">
              <div>
                <p class="eyebrow">Notes</p>
                <h3>阅读笔记</h3>
              </div>
            </div>
            <form id="noteForm" class="stack-form">
              <input id="noteTitleInput" type="text" placeholder="笔记标题，例如：核心贡献 / 方法流程 / 实验结论" />
              <textarea id="noteContentInput" rows="5" placeholder="把你读到的重点、问题和灵感记下来，这些笔记都会被保存成可回看的历史记录。"></textarea>
              <button class="button button--primary button--full" type="submit">保存笔记</button>
            </form>
            <div id="notesPanel" class="card-stack"></div>
          </section>

          <section class="panel">
            <div class="section-head">
              <div>
                <p class="eyebrow">Plan</p>
                <h3>研究规划</h3>
              </div>
            </div>
            <form id="planForm" class="stack-form">
              <textarea id="topicInput" rows="4" placeholder="输入研究主题，例如：AI 辅助论文阅读平台的设计与实现"></textarea>
              <button class="button button--ghost button--full" type="submit">生成研究计划</button>
            </form>
            <div id="planPanel" class="empty-state">生成后，这里会显示阅读路线、阶段目标和产出建议。</div>
            <div id="planHistoryPanel" class="card-stack history-block"></div>
          </section>

          <section class="panel">
            <div class="section-head">
              <div>
                <p class="eyebrow">Writing</p>
                <h3>写作草稿</h3>
              </div>
            </div>
            <form id="writingForm" class="stack-form">
              <textarea id="goalInput" rows="4" placeholder="输入写作目标，例如：生成课程综述提纲、摘要草稿或 related work 草稿"></textarea>
              <button class="button button--ghost button--full" type="submit">生成写作草稿</button>
            </form>
            <div id="writingPanel" class="empty-state">生成后，这里会展示提纲、摘要草稿和 related work 草稿。</div>
            <div id="draftHistoryPanel" class="card-stack history-block"></div>
          </section>
        </section>
      </main>
    </div>
    <script src="/static/app.js"></script>
  </body>
</html>
